services:
  rs-short:
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-rs-short:latest
    build:
      context: ./rs-short
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      # Persist the database and the generated config between restarts.
      - rs-short-data:/run_dir/db
      - rs-short-config:/run_dir
    environment:
      # Public hostname used in shortened URLs (no trailing slash).
      RS_INSTANCE_HOSTNAME: ${RS_INSTANCE_HOSTNAME:-https://s.rezel.net}
      # Optional: override auto-generated secrets.
      # RS_COOKIE_KEY:        <base64-encoded 64-byte key>
      # RS_PHISHING_PASSWORD: <random string>

  backend:
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - rs-short
    environment:
      RS_SHORT_URL: ${RS_SHORT_URL:-http://rs-short:8080}

  frontend:
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-frontend:latest
    build:
      context: ./site
      dockerfile: Dockerfile
      args:
        # Set to the public IP / domain of your VM so the browser can reach
        # the backend.  Example: http://192.168.1.42:8000
        # Copy .env.example to .env and adjust PUBLIC_API_URL before deploying.
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  rs-short-data:
  rs-short-config:

