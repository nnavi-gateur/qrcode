services:
  # One-shot container that fixes ownership of the db volume before rs-short starts.
  # Docker initializes named volumes as root-owned when the target directory doesn't
  # exist in the image, so we need to fix it at runtime.
  rs-short-init:
    image: debian:bookworm-slim
    user: root
    volumes:
      - rs-short-data:/run_dir/db
    command: ["chown", "-R", "1000:1000", "/run_dir/db"]
    restart: "no"

  rs-short:
    depends_on:
      rs-short-init:
        condition: service_completed_successfully
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-rs-short:latest
    build:
      context: ./rs-short
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      # Persist only the SQLite database between restarts.
      - rs-short-data:/run_dir/db
    environment:
      # Public hostname used in shortened URLs (no trailing slash).
      RS_INSTANCE_HOSTNAME: ${RS_INSTANCE_HOSTNAME:-https://qr.rezel.net}
      # Optional: override auto-generated secrets.
      # RS_COOKIE_KEY:        <base64-encoded 64-byte key>
      # RS_PHISHING_PASSWORD: <random string>

  backend:
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - rs-short
    environment:
      RS_SHORT_URL: ${RS_SHORT_URL:-http://rs-short:8080}

  frontend:
    # Pre-built image published to GHCR on every push to main.
    # Use `docker compose up --build` to build locally instead.
    image: ghcr.io/nnavi-gateur/qrcode-frontend:latest
    build:
      context: ./site
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  rs-short-data:

